server {
    listen       8082;
    server_name  localhost;

    root   /var/www/public;
    index  index.html;

    # Отдача статики
    location / {
        expires $expires;
        try_files $uri $uri/ /index.html;
        
        # Отключение кэширования для HTML
        if ($sent_http_content_type ~ "text/html") {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # WASM файлы с агрессивным кэшированием
    location ~ \.wasm$ {
        add_header Content-Type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires max;
    }

    # Сжатые WASM файлы
    location ~ \.wasm\.(gz|br)$ {
        add_header Content-Encoding $1;
        add_header Content-Type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires max;
    }

    # Отклонение скрытых файлов
    location ~ /\. {
        deny all;
    }
}
